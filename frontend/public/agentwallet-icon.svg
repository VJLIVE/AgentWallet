<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#iconGradient)"/>
  
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- AI Brain (Top) -->
  <g transform="translate(32, 18)">
    <!-- Central node -->
    <circle cx="0" cy="0" r="5" fill="white"/>
    <circle cx="0" cy="0" r="3" fill="#2563eb"/>
    
    <!-- Neural connections -->
    <line x1="0" y1="0" x2="-8" y2="-6" stroke="white" stroke-width="2" opacity="0.9"/>
    <line x1="0" y1="0" x2="8" y2="-6" stroke="white" stroke-width="2" opacity="0.9"/>
    <line x1="0" y1="0" x2="-8" y2="6" stroke="white" stroke-width="2" opacity="0.9"/>
    <line x1="0" y1="0" x2="8" y2="6" stroke="white" stroke-width="2" opacity="0.9"/>
    
    <!-- Outer nodes -->
    <circle cx="-8" cy="-6" r="2.5" fill="white"/>
    <circle cx="8" cy="-6" r="2.5" fill="white"/>
    <circle cx="-8" cy="6" r="2.5" fill="white"/>
    <circle cx="8" cy="6" r="2.5" fill="white"/>
  </g>
  
  <!-- Connection line -->
  <line x1="32" y1="28" x2="32" y2="34" stroke="white" stroke-width="2" stroke-dasharray="3,3" opacity="0.7"/>
  
  <!-- Wallet (Bottom) -->
  <g transform="translate(32, 46)">
    <!-- Wallet body -->
    <rect x="-12" y="-8" width="24" height="16" rx="2" fill="white"/>
    
    <!-- Wallet flap -->
    <rect x="-12" y="-8" width="24" height="5" rx="2" fill="#10b981"/>
    
    <!-- Dollar sign -->
    <text x="0" y="2" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2563eb" text-anchor="middle" dominant-baseline="middle">$</text>
  </g>
  
  <!-- Small decorative dots -->
  <circle cx="12" cy="12" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="52" cy="12" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="12" cy="52" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="52" cy="52" r="1.5" fill="white" opacity="0.4"/>
</svg>
