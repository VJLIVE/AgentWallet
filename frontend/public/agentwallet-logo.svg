<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle with Gradient -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGradient)" />
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#strokeGradient)" stroke-width="4"/>
  
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="strokeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.5" />
    </linearGradient>
  </defs>
  
  <!-- AI Brain/Neural Network (Top) -->
  <g transform="translate(100, 50)">
    <!-- Central AI Node -->
    <circle cx="0" cy="0" r="12" fill="white" stroke="white" stroke-width="3"/>
    <circle cx="0" cy="0" r="8" fill="#2563eb"/>
    
    <!-- Neural Connections -->
    <line x1="0" y1="0" x2="-20" y2="-15" stroke="white" stroke-width="3" opacity="0.9"/>
    <line x1="0" y1="0" x2="20" y2="-15" stroke="white" stroke-width="3" opacity="0.9"/>
    <line x1="0" y1="0" x2="-25" y2="10" stroke="white" stroke-width="3" opacity="0.9"/>
    <line x1="0" y1="0" x2="25" y2="10" stroke="white" stroke-width="3" opacity="0.9"/>
    
    <!-- Outer Neural Nodes -->
    <circle cx="-20" cy="-15" r="6" fill="white"/>
    <circle cx="20" cy="-15" r="6" fill="white"/>
    <circle cx="-25" cy="10" r="6" fill="white"/>
    <circle cx="25" cy="10" r="6" fill="white"/>
  </g>
  
  <!-- Connection Arrow -->
  <g transform="translate(100, 85)">
    <line x1="0" y1="0" x2="0" y2="20" stroke="white" stroke-width="3" stroke-dasharray="5,5" opacity="0.8"/>
    <polygon points="0,20 -5,12 5,12" fill="white" opacity="0.8"/>
  </g>
  
  <!-- Wallet (Bottom) -->
  <g transform="translate(100, 130)">
    <!-- Wallet Body -->
    <rect x="-35" y="-20" width="70" height="45" rx="6" fill="white" stroke="white" stroke-width="2"/>
    
    <!-- Wallet Flap -->
    <rect x="-35" y="-20" width="70" height="15" rx="6" fill="#10b981"/>
    
    <!-- Card Slots -->
    <rect x="-25" y="0" width="50" height="6" rx="2" fill="#e5e7eb"/>
    <rect x="-25" y="10" width="35" height="6" rx="2" fill="#e5e7eb"/>
    
    <!-- Dollar Sign -->
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#2563eb" text-anchor="middle" dominant-baseline="middle">$</text>
  </g>
  
  <!-- Security Shield (Left) -->
  <g transform="translate(40, 100)">
    <path d="M 0 -15 L 8 -10 L 8 5 Q 8 10 0 15 Q -8 10 -8 5 L -8 -10 Z" fill="white" opacity="0.9" stroke="white" stroke-width="1"/>
    <path d="M 0 -5 L -4 0 L -2 2 L 0 4 L 6 -2" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  
  <!-- Payment Icon (Right) -->
  <g transform="translate(160, 100)">
    <circle cx="0" cy="0" r="12" fill="white" opacity="0.9"/>
    <path d="M -6 0 L 3 0 M 3 0 L -1 -4 M 3 0 L -1 4" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="6" cy="0" r="2" fill="#10b981"/>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="50" cy="50" r="3" fill="white" opacity="0.4"/>
  <circle cx="150" cy="50" r="3" fill="white" opacity="0.4"/>
  <circle cx="50" cy="150" r="3" fill="white" opacity="0.4"/>
  <circle cx="150" cy="150" r="3" fill="white" opacity="0.4"/>
</svg>
